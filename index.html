<!DOCTYPE html>
<html>
<head>
<title>Veterinary Clinic Management System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    text-align: center;
    /* Basic background image */

  background-image: url('dog-cat.jpg');
  background-size: cover;       /* Covers the entire element */
  background-position: center;  /* Centers the image */
  background-repeat: no-repeat; /* Prevents tiling */
  background-attachment: fixed; /* Parallax-like fixed effect */

}

h1 {
    color: #222222;
    text-shadow:
      0 0 8px rgba(180, 180, 180, 0.9),
      0 0 16px rgba(160, 160, 160, 0.7),
      0 0 30px rgba(140, 140, 140, 0.5),
      0 0 50px rgba(120, 120, 120, 0.3),
      2px 2px 4px rgba(50, 50, 50, 0.6);
  }

ul{
    list-style-type: none;
    padding: 0;
    margin-top: 40px;
}

li{
    margin: 20px;
}

a{
    text-decoration: none;
    background-color: #4CAF50;
    color: white;
    padding: 15px 30px;
    border-radius: 8px;
    font-size: 18px;
    display: inline-block;
    width: 250px;
}

a:hover{
    background-color: #45a049;
}

</style>

</head>

<body>

<ul>

</html>
