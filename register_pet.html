<!DOCTYPE html>
<html>
<head>
  <title>Register Pet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: url('dog-cat.jpg');
      background-size: cover;       /* Covers the entire element */
      background-position: center;  /* Centers the image */
      background-repeat: no-repeat; /* Prevents tiling */
      background-attachment: fixed; /* Parallax-like fixed effect */
    }

    .card {
      background: #fff;
      border: 1px solid #e4e4e0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #e6f1fb;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      font-size: 22px;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1rem;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    input {
      height: 38px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #378add;
      box-shadow: 0 0 0 3px #e6f1fb;
    }

    input::placeholder { color: #bbb; }

    .btn {
      width: 100%;
      height: 40px;
      margin-top: 0.5rem;
      background: #185fa5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover { background: #0c447c; }

    .back {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }

    .back:hover { color: #111; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">🐾</div>
  <h2>Register a pet</h2>
  <p class="subtitle">Fill in the details below to add a new pet.</p>

  <form method="POST">

    <div class="field">
      <label for="name">Pet name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Buddy" required>
    </div>

    <div class="field">
      <label for="species">Species</label>
      <input type="text" id="species" name="species" placeholder="e.g. Dog" required>
    </div>

    <div class="field">
      <label for="owner">Owner name</label>
      <input type="text" id="owner" name="owner" placeholder="e.g. Jane Smith" required>
    </div>

    <button class="btn" type="submit">Register pet</button>
  </form>

  <a class="back" href="/">← Back to dashboard</a>
</div>

</body>
</html>
